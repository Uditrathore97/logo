<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 40px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.title {
  color: #1B71AC;
  font-size: 24px;
  font-weight: bold;
}
.subtitle {
  color: #2AB573;
}
.content {
  margin-top: 20px;
  line-height: 1.6;
}
.watermark {
  position: fixed;
  top: 30%;
  left: 30%;
  opacity: 0.2;
  font-size: 60px;
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="title">{{subject}}</div>
    <div class="subtitle">{{chapter}}</div>
  </div>
  <img src="https://anujjindal.in/wp-content/uploads/2022/05/LOGO-FULL-01.png" width="120"/>
</div>

<div class="content">
  <h2>{{title}}</h2>
  <p>{{content}}</p>
</div>

<div class="watermark">LOGO</div>

</body>
</html>
